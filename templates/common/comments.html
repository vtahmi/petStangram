{% load static %}
<!-- Start Comments Section -->
{% for comment in comments %}
<div class="comments">
    <div class="comment-body">
        {{ comment.text }}
    </div>
    <div class="comment-header">
        <strong>{{ comment.user.profile.full_name|default:'anonymous' }}</strong>
    </div>
    <div class="comment-date">
        {{ comment.date_time_of_publication|date:'M d, Y, H:i' }}
    </div>

</div>
{% empty %}
<p>No comments yet.</p>
{% endfor %}
<!-- End Comments Section -->
