{%extends "common/base.html" %}

{% block content %}
<main>
    <!-- Start Add Photo Section -->
    <div class="edit-delete edit-photo">
        <h2>Edit photo</h2>
        <!-- Start Edit Photo Form -->
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form }}
            <!-- Edit Photo Button -->
            <button class="add-btn" type="submit">Save</button>
        </form>
        <!-- End Edit Photo Form -->
    </div>
    <!-- End Edit Photo Section -->
</main>
{% endblock %}
